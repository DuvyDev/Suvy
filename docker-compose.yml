version: "3.8"

services:
  suvy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suvy
    restart: unless-stopped
    ports:
      - "8800:8800"
    environment:
      # Server
      PORT: 8800
      SITE_URL: http://localhost:8800

      # Crawler
      CRAWLER_API: http://duvycrawl:8080/api/v1

      # DuckDuckGo fallback
      DDG_ENABLED: "true"
      DDG_RESULTS: 3
      DDG_CACHE_TTL_MINUTES: 120

      # UI settings
      NEWS_MAX_ITEMS: 5
      WIKIPEDIA_CARD_ENABLED: "true"
      RESULTS_PER_PAGE: 10
      DEFAULT_LANG: es
    volumes:
      - ./data:/app/data
    networks:
      - suvy-net

  # Uncomment and configure if you want DuvyCrawl in the same compose
  # duvycrawl:
  #   image: ghcr.io/duvydev/duvycrawl:latest
  #   container_name: duvycrawl
  #   restart: unless-stopped
  #   ports:
  #     - "8800:8800"
  #   volumes:
  #     - ./crawler-data:/data
  #   networks:
  #     - suvy-net

networks:
  suvy-net:
    driver: bridge
